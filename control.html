<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Institutional Terminal | Control Group</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#eef2f3; display:flex; justify-content:center; padding:20px 0; min-height:100vh; color:#1e293b; }
.main-content { width:95%; max-width:1200px; }
header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; color:#1e293b; }
#clock { font-family:monospace; font-weight:bold; font-size:1.1rem; }
.panel { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); border-top:4px solid #2563eb; color:#1e293b; }
input[type="number"] { width:100%; padding:8px 10px; border:1px solid #cbd5e1; border-radius:6px; font-size:0.9rem; background:#f8fafc; }
input[type="number"]:focus { border-color:#2563eb; outline:none; box-shadow:0 0 5px rgba(37,99,235,0.4); }
button { width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; transition:0.3s; }
button:hover { background:#1e40af; }
table { width:100%; border-collapse:collapse; font-size:0.8rem; }
table th, table td { padding:8px 10px; border-bottom:1px solid #ddd; }
table th { text-align:left; color:#1e293b; }
#val-display { font-weight:bold; color:#1e293b; }
.grid-container { display:grid; grid-template-columns:1.8fr 1fr; gap:25px; }
@media screen and (max-width:768px){ .grid-container { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="main-content">
    <header>
        <div style="font-size:0.8rem;">CONTROL SESSION: DATA LOGGING ENABLED</div>
        <div id="clock">12:00:00 PM</div>
    </header>

    <main class="tab-content">
        <div class="grid-container">

            <div class="panel">
                <span style="font-size:0.75rem; font-weight:bold; color:#64748b;">NIFTY 50 INDEX</span>
                <div style="font-size:4rem; font-weight:700; margin:10px 0;" id="price">18245.50</div>
                <div style="font-size:0.8rem; color:#64748b;">System Heartbeat: <span id="ping">12ms</span></div>
            </div>

            <div class="panel">
                <h4 style="margin-top:0; font-size:0.85rem; border-bottom:1px solid #ddd; padding-bottom:10px;">ORDER TICKET</h4>

                <label style="display:block; font-size:0.75rem; margin-bottom:5px;">QUANTITY (LOTS)</label>
                <input type="number" id="qty-input" value="1" min="1" max="10">

                <div style="margin:15px 0; padding:10px; background:#eff6ff; border:1px dashed #2563eb; font-size:0.85rem; color:#1e293b;">
                    Total Value: <b id="val-display">$18,245.50</b>
                </div>

                <button onclick="submitOrder()"><i class="fa-solid fa-check"></i> SUBMIT ORDER</button>
            </div>

        </div>

        <div class="panel" style="margin-top:20px;">
            <h4 style="margin-top:0; font-size:0.85rem;">TRANSACTION LOG</h4>
            <table>
                <thead>
                    <tr style="border-bottom:2px solid #ddd;">
                        <th>Timestamp</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="audit-body"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
let researchLogs = [];
let sessionStart = Date.now();
let lastActionTime = sessionStart;
const pID = localStorage.getItem('aishu_user') || ("CONTROL_" + Math.floor(Math.random()*9000+1000));

function submitOrder() {
    const qty = parseInt(document.getElementById('qty-input').value);
    const price = document.getElementById('price').innerText;
    let decisionTime = ((Date.now()-lastActionTime)/1000).toFixed(2);
    let riskFlag = (decisionTime<3 || qty===10)?"HIGH":"NORMAL";

    researchLogs.push({
        Trade: researchLogs.length+1,
        Qty: qty,
        Price: price,
        Decision_Time_Secs: decisionTime,
        Risk_Level: riskFlag,
        Time_Elapsed_Secs: ((Date.now()-sessionStart)/1000).toFixed(2)
    });

    lastActionTime=Date.now();

    // --- SEND DATA TO BACKEND ---
   fetch('http://localhost:5000/log_trade',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body: JSON.stringify({
    user_id: pID,
    group_type: 'Control',
    trade_no: researchLogs.length,
    qty: qty,
    price: price,
    decision_time_secs: decisionTime,
    risk_level: riskFlag,
    time_elapsed_secs: ((Date.now()-sessionStart)/1000).toFixed(2)
})
});
    const row=document.getElementById('audit-body').insertRow(0);
    row.innerHTML=`<td>${new Date().toLocaleTimeString()}</td><td>${qty}</td><td>${price}</td><td style="color:green;">FILLED</td>`;

    if(researchLogs.length===10){ setTimeout(downloadControlCSV,500); }
}

function downloadControlCSV(){
    let csv="Trade_No,Quantity,Price,Decision_Time_Secs,Risk_Level,Seconds_Elapsed\n";
    researchLogs.forEach(r=>{csv+=`${r.Trade},${r.Qty},${r.Price},${r.Decision_Time_Secs},${r.Risk_Level},${r.Time_Elapsed_Secs}\n`;});
    const blob=new Blob([csv],{type:'text/csv'});
    const url=window.URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`Control_Data_${pID}.csv`;
    a.click();
    alert("Control session complete. Data exported.");
}

// Update price, total value, clock every second
setInterval(()=>{
    const priceEl=document.getElementById('price');
    const qtyEl=document.getElementById('qty-input');
    const valEl=document.getElementById('val-display');
    const newPrice=(18240+Math.random()*20).toFixed(2);
    priceEl.innerText=newPrice;

    const qty=parseInt(qtyEl.value);
    valEl.innerText="$"+(newPrice*qty).toLocaleString();
    document.getElementById('clock').innerText=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
