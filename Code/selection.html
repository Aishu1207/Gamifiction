<!DOCTYPE html>
<html>
<head>
    <title>Select Environment</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eef2f3; }
        .box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn { padding: 20px 40px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.1rem; color: white; transition: 0.3s; }
        .btn-normal { background: #444; }
        .btn-gamified { background: #f39c12; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="box">
        <h2>Choose Your Trading Environment</h2>
        <p>Participant: <span id="disp-id"></span></p>
        <button class="btn btn-normal" onclick="window.location.href='control.html'">Normal Interface</button>
        <button class="btn btn-gamified" onclick="window.location.href='gamified.html'">Gamified Interface</button>
    </div>
    <script>
        document.getElementById('disp-id').innerText = localStorage.getItem('aishu_user');
    </script>
</body>
</html>
