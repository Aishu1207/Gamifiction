<!DOCTYPE html>
<html>
<head>
    <title>REGISTER</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 420px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(243,156,18,0.25); /* subtle orange glow */
        }

        h2{
            text-align:center;
            color:#1a2a6c;
            margin-bottom:8px;
            font-size:1.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        h2 i {
            color: #f39c12;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }

        .badge{
            background: #eef2ff;
            color:#1a2a6c;
            padding:8px 15px;
            border-radius:30px;
            font-size:13px;
            display:block;
            text-align:center;
            margin-bottom:25px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.05);
        }

        .input-box{
            position:relative;
            margin-bottom:15px;
        }

        .input-box i{
            position:absolute;
            left:12px;
            top:50%;
            transform:translateY(-50%);
            color:#888;
        }

        input, select{
            width:100%;
            padding:12px 12px 12px 38px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
            font-size:15px;
            transition: 0.3s;
        }

        /* Focus with subtle orange glow */
        input:focus, select:focus{
            border-color:#f39c12;
            box-shadow: 0 0 8px rgba(243,156,18,0.3);
            outline:none;
        }

        /* Gamified orange gradient button */
        .btn-submit{
            background: linear-gradient(45deg, #f39c12, #e67e22);
            color:white;
            border:none;
            padding:15px;
            width:100%;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
            font-size:16px;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            transition: 0.3s;
        }

        .btn-submit:hover{
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(243,156,18,0.4);
        }

        .btn-back{
            margin-top:10px;
            background:#666;
            color:white;
            border:none;
            padding:12px;
            width:100%;
            border-radius:8px;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:6px;
            transition: 0.3s;
        }

        .btn-back:hover{
            background:#555;
            transform: scale(1.03);
        }

        .btn-submit i, .btn-back i{
            font-size:1.2rem;
        }
    </style>
</head>

<body>

<div class="card">

    <h2><i class="fa-solid fa-user-plus"></i> Register</h2>

    <div class="badge">
        <i class="fa-solid fa-flask"></i> Research Simulation Platform
    </div>

    <div class="input-box">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="name" placeholder="Full Name">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-id-card"></i>
        <input type="text" id="userid" placeholder="ID">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-calendar"></i>
        <select id="age">
            <option>18-24</option>
            <option>25-35</option>
        </select>
    </div>

    <div class="input-box">
        <i class="fa-solid fa-chart-line"></i>
        <select id="exp">
            <option>Beginner</option>
            <option>Pro</option>
        </select>
    </div>

    <button class="btn-submit" onclick="submitReg()">
        <i class="fa-solid fa-check"></i> Register & Continue
    </button>

    <button class="btn-back" onclick="window.location.href='login.html'">
        <i class="fa-solid fa-arrow-left"></i> Back to Login
    </button>

</div>

<script>
async function submitReg() {

    const data = {
        user_id: document.getElementById('userid').value,
        name: document.getElementById('name').value,
        age: document.getElementById('age').value,
        experience: document.getElementById('exp').value
    };

    const response = await fetch('http://localhost:5000/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });

    const res = await response.json();

    if(res.status === 'success') {

        Swal.fire({
            icon: 'success',
            title: 'ID Registered Successfully',
            text: 'Welcome to TradePlay Research Simulation',
            confirmButtonColor: '#f39c12'
        }).then(()=>{
            localStorage.setItem('aishu_user', data.user_id);
            window.location.href = 'selection.html';
        });

    } 
    else { 
        Swal.fire({
            icon: 'error',
            title: 'Registration Failed',
            text: res.message
        });
    }
}
</script>

</body>
</html>
