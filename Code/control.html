<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institutional Terminal | Control Group</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #f1f5f9;">
    <div class="main-content">
        <header>
            <div style="font-size: 0.8rem; color: #64748b;">CONTROL SESSION: DATA LOGGING ENABLED</div>
            <div id="clock" style="font-family: monospace; font-weight: bold;">12:00:00 PM</div>
        </header>

        <main class="tab-content">
            <div style="display: grid; grid-template-columns: 1.8fr 1fr; gap: 25px;">
                
                <div class="panel">
                    <span style="font-size: 0.75rem; color: #64748b; font-weight: bold;">NIFTY 50 INDEX</span>
                    <div style="font-size: 4rem; font-weight: 700; color: #0f172a; margin: 10px 0;" id="price">18245.50</div>
                    <div style="font-size: 0.8rem; color: #64748b;">System Heartbeat: <span id="ping">12ms</span></div>
                </div>
                <div class="panel">
                    <h4 style="margin-top: 0; font-size: 0.85rem; border-bottom: 1px solid #eee; padding-bottom: 10px;">ORDER TICKET</h4>
                    
                    <label style="display:block; font-size:0.7rem; margin-bottom:5px;">QUANTITY (LOTS)</label>
                    <input type="number" id="qty-input" value="1" min="1" max="10" style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:4px;">
                    
                    <div style="margin: 20px 0; padding: 10px; background: #f8fafc; border: 1px dashed #cbd5e1; font-size: 0.8rem;">
                        Total Value: <b id="val-display">$18,245.50</b>
                    </div>

                    <button onclick="submitOrder()" style="width:100%; padding:15px; background:#334155; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">SUBMIT ORDER</button>
                </div>
            </div>

            <div class="panel" style="margin-top: 20px;">
                <h4 style="margin-top: 0; font-size: 0.85rem;">TRANSACTION LOG</h4>
                <table style="width: 100%; font-size: 0.8rem; text-align: left;">
                    <thead><tr style="border-bottom: 2px solid #eee;"><th>Timestamp</th><th>Qty</th><th>Price</th><th>Status</th></tr></thead>
                    <tbody id="audit-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // --- RESEARCH LOGGING (Matches Gamified Format) ---
       let researchLogs = [];
    let sessionStart = Date.now();
    let lastActionTime = sessionStart; // ✅ ADD THIS
    let pID = "CONTROL_" + Math.floor(Math.random() * 9000 + 1000);

        function submitOrder() {
            const qty = parseInt(document.getElementById('qty-input').value);
            const price = document.getElementById('price').innerText;

            // 1. Silent Data Log
            let decisionTime = ((Date.now() - lastActionTime) / 1000).toFixed(2);
            let riskFlag = (decisionTime < 3 || qty === 10) ? "HIGH" : "NORMAL";
            
            researchLogs.push({
                Trade: researchLogs.length + 1,
                Qty: qty,
                Price: price,
                Decision_Time_Secs: decisionTime,
                Risk_Level: riskFlag,
                Time_Elapsed_Secs: ((Date.now() - sessionStart) / 1000).toFixed(2)
            });

lastActionTime = Date.now();


            // 2. UI Update (Audit Trail)
            const row = document.getElementById('audit-body').insertRow(0);
            row.innerHTML = `<td>${new Date().toLocaleTimeString()}</td><td>${qty}</td><td>${price}</td><td><span style="color:green">FILLED</span></td>`;

            // 3. Auto-Export at 10 Trades
            if(researchLogs.length === 10) {
                setTimeout(downloadControlCSV, 500);
            }
        }

        function downloadControlCSV() {
            let csv = "Trade_No,Quantity,Price,Decision_Time_Secs,Risk_Level,Seconds_Elapsed\n";
            researchLogs.forEach(r => {
                csv += `${r.Trade},${r.Qty},${r.Price},${r.Decision_Time_Secs},${r.Risk_Level},${r.Time_Elapsed_Secs}\n`;

            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Control_Data_${pID}.csv`;
            a.click();
            alert("Control session complete. Data exported.");
        }

        // --- UTILS ---
        setInterval(() => {
            document.getElementById('price').innerText = (18240 + Math.random()*20).toFixed(2);
            const p = parseFloat(document.getElementById('price').innerText);
            const q = document.getElementById('qty-input').value;
            document.getElementById('val-display').innerText = "$" + (p * q).toLocaleString();
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 3000);
    </script>
</body>
</html>
